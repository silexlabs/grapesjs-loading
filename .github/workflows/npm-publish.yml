name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile
      - run: if jq -e ".scripts.lint" package.json >/dev/null 2>&1; then yarn run lint; fi
      - run: if jq -e ".scripts.build" package.json >/dev/null 2>&1; then yarn run build; fi
      - run: if jq -e ".scripts.test" package.json >/dev/null 2>&1; then yarn test; fi

      - name: Extract version and tag
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=prerelease" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: npm publish --tag ${{ steps.version.outputs.tag }} --access public